    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';

      // --- GENERADOR DE TEXTURA CLÁSICA "BAJOS" DE RESPALDO (CANVAS) ---
      function createBajosTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        ctx.font = 'bold 72px "Times New Roman", Times, serif';
        const text = "B A J O S";
        
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 14;
        ctx.strokeText(text, canvas.width / 2, canvas.height / 2);
        
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 6;
        ctx.strokeText(text, canvas.width / 2, canvas.height / 2);
        
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.strokeText(text, canvas.width / 2, canvas.height / 2);
        
        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        return texture;
      }

      class SpatialSequencer {
        constructor() {
          this.audioCtx = null;
          this.step = 0;
          this.intervalId = null;
          this.bpm = 110;
          this.isPlaying = false;
          this.activeSynths = new Map(); // Almacena tótems con sus panners y estados
          this.analyser = null;
          this.dataArray = null;
          this.bufferLength = 0;
          this.masterGain = null;
        }

        initContext() {
          if (!this.audioCtx) {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Nodo master de ganancia para una excelente salida acústica (1.5 de volumen)
            this.masterGain = this.audioCtx.createGain();
            this.masterGain.gain.setValueAtTime(1.5, this.audioCtx.currentTime);

            // Filtro analizador de espectro
            this.analyser = this.audioCtx.createAnalyser();
            this.analyser.fftSize = 64; 
            this.bufferLength = this.analyser.frequencyBinCount;
            this.dataArray = new Uint8Array(this.bufferLength);

            this.masterGain.connect(this.analyser);
            this.analyser.connect(this.audioCtx.destination);
          }
          if (this.audioCtx.state === 'suspended') {
            this.audioCtx.resume().catch(err => {
              console.error("No se pudo iniciar el AudioContext:", err);
            });
          }
          if (!this.isPlaying) {
            this.isPlaying = true;
            const tickTime = 30000 / this.bpm; 
            this.intervalId = setInterval(() => this.tick(), tickTime);
          }
        }

        updateListener(camera) {
          if (!this.audioCtx) return;
          const listener = this.audioCtx.listener;
          const position = new THREE.Vector3();
          const quaternion = new THREE.Quaternion();
          camera.getWorldPosition(position);
          camera.getWorldQuaternion(quaternion);

          const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(quaternion);
          const up = new THREE.Vector3(0, 1, 0).applyQuaternion(quaternion);
          const time = this.audioCtx.currentTime;

          try {
            if (listener.positionX) {
              listener.positionX.setValueAtTime(position.x, time);
              listener.positionY.setValueAtTime(position.y, time);
              listener.positionZ.setValueAtTime(position.z, time);
              listener.forwardX.setValueAtTime(forward.x, time);
              listener.forwardY.setValueAtTime(forward.y, time);
              listener.forwardZ.setValueAtTime(forward.z, time);
              listener.upX.setValueAtTime(up.x, time);
              listener.upY.setValueAtTime(up.y, time);
              listener.upZ.setValueAtTime(up.z, time);
            } else {
              listener.setPosition(position.x, position.y, position.z);
              listener.setOrientation(forward.x, forward.y, forward.z, up.x, up.y, up.z);
            }
          } catch (e) {}
        }


        updatePannerPosition(totemId, position) {
          const synthObj = this.activeSynths.get(totemId);
          if (synthObj && synthObj.panner) {
            try {
              const time = this.audioCtx.currentTime;
              if (synthObj.panner.positionX) {
                synthObj.panner.positionX.setValueAtTime(position.x, time);
                synthObj.panner.positionY.setValueAtTime(position.y, time);
                synthObj.panner.positionZ.setValueAtTime(position.z, time);
              }
            } catch (e) {}
          }
        }

        triggerVisualFeedback(totemId) {
          const synthObj = this.activeSynths.get(totemId);
          if (synthObj) {
            synthObj.lastTriggerTime = performance.now();
          }
        }

        tick() {
          if (!this.audioCtx || this.audioCtx.state === 'suspended') return;
          
          this.step = (this.step + 1) % 16;

          this.activeSynths.forEach((synthObj, totemId) => {
            if (!synthObj.isPlacedActive) return;

            const category = synthObj.category;
            const variant = synthObj.variant;
            
            this.ensurePannerCreated(totemId);
            
            const currentWorldPos = synthObj.getWorldPosCallback();
            this.updatePannerPosition(totemId, currentWorldPos);

            const time = this.audioCtx.currentTime;
            let noteTriggered = false;

            if (category === 'percussion') {
              noteTriggered = this.playPercussion(variant, time, synthObj.panner);
            } else if (category === 'bass') {
              noteTriggered = this.playBass(variant, time, synthObj.panner);
            } else if (category === 'harmony') {
              noteTriggered = this.playHarmony(variant, time, synthObj.panner);
            } else if (category === 'voice') {
              noteTriggered = this.playVoice(variant, time, synthObj.panner);
            } else if (category === 'fx') {
              noteTriggered = this.playFX(variant, time, synthObj.panner);
            }

            if (noteTriggered) {
              this.triggerVisualFeedback(totemId);
            }
          });
        }

        playPercussion(variant, time, panner) {
          if (variant === 0 && (this.step % 4 === 0)) {
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.connect(gain);
            gain.connect(panner);
            osc.frequency.setValueAtTime(150, time);
            osc.frequency.exponentialRampToValueAtTime(45, time + 0.1);
            gain.gain.setValueAtTime(1.0, time); 
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.12);
            osc.start(time);
            osc.stop(time + 0.13);
            return true;
          } else if (variant === 1 && (this.step % 2 === 0)) {
            const bufferSize = this.audioCtx.sampleRate * 0.05;
            const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
              data[i] = Math.random() * 2 - 1;
            }
            const noise = this.audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = this.audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.setValueAtTime(7000, time);
            const gain = this.audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, time); 
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.04);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(panner);
            noise.start(time);
            noise.stop(time + 0.05);
            return true;
          } else if (variant === 2 && (this.step === 2 || this.step === 6 || this.step === 10 || this.step === 14)) {
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.type = 'triangle';
            osc.connect(gain);
            gain.connect(panner);
            osc.frequency.setValueAtTime(800, time);
            gain.gain.setValueAtTime(0.4, time); 
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
            osc.start(time);
            osc.stop(time + 0.1);
            return true;
          }
          return false;
        }


        playBass(variant, time, panner) {
          let note = 0;
          let trigger = false;
          if (variant === 0) {
            if (this.step % 8 === 0) { note = 55.00; trigger = true; } 
          } else if (variant === 1) {
            if (this.step % 4 === 0) {
              const notes = [55.00, 65.41, 73.42, 65.41]; 
              note = notes[(this.step / 4) % notes.length];
              trigger = true;
            }
          } else if (variant === 2) {
            const pattern = [0, 3, 8, 11];
            if (pattern.includes(this.step)) {
              note = this.step < 8 ? 65.41 : 73.42;
              trigger = true;
            }
          }
          if (trigger) {
            const osc = this.audioCtx.createOscillator();
            const filter = this.audioCtx.createBiquadFilter();
            const gain = this.audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(note, time);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(350, time);
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(panner);
            gain.gain.setValueAtTime(0.8, time); 
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.35);
            osc.start(time);
            osc.stop(time + 0.38);
            return true;
          }
          return false;
        }

        playHarmony(variant, time, panner) {
          if (this.step === 0) {
            const activeChords = [
              [110.00, 130.81, 164.81, 220.00], 
              [110.00, 146.83, 196.00, 220.00], 
              [130.81, 164.81, 196.00, 261.63]  
            ];
            const chord = activeChords[variant];
            chord.forEach((freq) => {
              const osc = this.audioCtx.createOscillator();
              const gain = this.audioCtx.createGain();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(freq, time);
              gain.gain.setValueAtTime(0, time);
              gain.gain.linearRampToValueAtTime(0.18, time + 0.35); 
              gain.gain.exponentialRampToValueAtTime(0.01, time + 2.1);
              osc.connect(gain);
              gain.connect(panner);
              osc.start(time);
              osc.stop(time + 2.2);
            });
            return true;
          }
          return false;
        }

        playVoice(variant, time, panner) {
          let note = 0;
          let playStep = false;
          const scale = [220.00, 261.63, 293.66, 329.63, 392.00, 440.00]; 
          if (variant === 0) {
            const pattern = [0, 2, 4, 6, 8, 10, 12, 14];
            if (pattern.includes(this.step)) {
              const idxMap = [0, 2, 3, 4, 5, 4, 3, 2];
              note = scale[idxMap[pattern.indexOf(this.step)]];
              playStep = true;
            }
          } else if (variant === 1) {
            const pattern = [1, 3, 7, 9, 13, 15];
            if (pattern.includes(this.step)) {
              const idxMap = [2, 3, 5, 4, 2, 1];
              note = scale[idxMap[pattern.indexOf(this.step)]];
              playStep = true;
            }
          } else if (variant === 2) {
            if (this.step % 3 === 0) {
              const idxs = [4, 1, 3, 5, 2, 0];
              note = scale[idxs[(this.step / 3) | 0]];
              playStep = true;
            }
          }
          if (playStep && note > 0) {
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(note, time);
            gain.gain.setValueAtTime(0.02, time);
            gain.gain.linearRampToValueAtTime(0.35, time + 0.06); 
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.28);
            osc.connect(gain);
            gain.connect(panner);
            osc.start(time);
            osc.stop(time + 0.3);
            return true;
          }
          return false;
        }


        playFX(variant, time, panner) {
          if (variant === 0) {
            if (this.step === 0) {
              const osc = this.audioCtx.createOscillator();
              const gain = this.audioCtx.createGain();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(150, time);
              osc.frequency.exponentialRampToValueAtTime(550, time + 1.6);
              gain.gain.setValueAtTime(0, time);
              gain.gain.linearRampToValueAtTime(0.15, time + 0.8); 
              gain.gain.linearRampToValueAtTime(0, time + 1.6);
              osc.connect(gain);
              gain.connect(panner);
              osc.start(time);
              osc.stop(time + 1.7);
              return true;
            }
          } else if (variant === 1) {
            if (this.step === 4 || this.step === 12) {
              const osc = this.audioCtx.createOscillator();
              const gain = this.audioCtx.createGain();
              osc.type = 'triangle';
              osc.frequency.setValueAtTime(660.00, time);
              gain.gain.setValueAtTime(0.16, time); 
              gain.gain.exponentialRampToValueAtTime(0.01, time + 0.25);
              osc.connect(gain);
              gain.connect(panner);
              osc.start(time);
              osc.stop(time + 0.27);
              return true;
            }
          } else if (variant === 2) {
            if (this.step % 4 === 1) {
              const osc = this.audioCtx.createOscillator();
              const gain = this.audioCtx.createGain();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(329.63, time);
              gain.gain.setValueAtTime(0.12, time); 
              gain.gain.exponentialRampToValueAtTime(0.01, time + 0.18);
              osc.connect(gain);
              gain.connect(panner);
              osc.start(time);
              osc.stop(time + 0.2);
              return true;
            }
          }
          return false;
        }

        registerTotem(totemId, category, variant, getWorldPosCallback) {
          this.activeSynths.set(totemId, {
            category,
            variant,
            panner: null,
            isPlacedActive: false,
            getWorldPosCallback,
            lastTriggerTime: 0
          });
        }

        ensurePannerCreated(totemId) {
          this.initContext();
          const synthObj = this.activeSynths.get(totemId);
          if (synthObj && !synthObj.panner && this.audioCtx) {
            try {
              const panner = this.audioCtx.createPanner();
              panner.panningModel = 'HRTF';
              panner.distanceModel = 'inverse';
              panner.refDistance = 0.5;
              panner.maxDistance = 100;
              panner.rolloffFactor = 1.6;

              const initialPos = synthObj.getWorldPosCallback();
              panner.positionX.setValueAtTime(initialPos.x, this.audioCtx.currentTime);
              panner.positionY.setValueAtTime(initialPos.y, this.audioCtx.currentTime);
              panner.positionZ.setValueAtTime(initialPos.z, this.audioCtx.currentTime);

              panner.connect(this.masterGain);
              synthObj.panner = panner;
            } catch (e) {
              const fallbackGain = this.audioCtx.createGain();
              fallbackGain.connect(this.masterGain); 
              synthObj.panner = fallbackGain; 
            }
          }
        }

        setTotemState(totemId, isPlacedActive) {
          if (isPlacedActive) {
            this.ensurePannerCreated(totemId);
          }
          const synthObj = this.activeSynths.get(totemId);
          if (synthObj) {
            synthObj.isPlacedActive = isPlacedActive;
          }
        }
      }


      class TotemElement extends THREE.Group {
        constructor(colorHex, category, variant, initialPos, name) {
          super();
          this.colorHex = colorHex;
          this.category = category;
          this.variant = variant;
          this.totemName = name;
          
          this.initialPosition = initialPos.clone();
          this.targetDockPosition = initialPos.clone();
          this.position.copy(initialPos);
          
          this.isGrabbed = false;
          this.isDockedActive = false;

          // Parámetros para destello de conexión
          this.dockedTime = 0;
          this.wasDockedPreviously = false;

          // Cuerpo cilíndrico del tótem (con emisión suave por defecto)
          const bodyGeo = new THREE.CylinderGeometry(0.038, 0.038, 0.28, 16);
          const bodyMat = new THREE.MeshStandardMaterial({
            color: colorHex,
            emissive: colorHex,
            emissiveIntensity: 0.15, // Luz leve predeterminada
            metalness: 0.2,
            roughness: 0.3,
          });
          this.bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
          this.add(this.bodyMesh);

          // Cristal superior geométrico según su variante (0, 1 o 2)
          let topGeo;
          if (variant === 0) {
            topGeo = new THREE.OctahedronGeometry(0.05); 
          } else if (variant === 1) {
            topGeo = new THREE.BoxGeometry(0.065, 0.065, 0.065); 
          } else {
            topGeo = new THREE.ConeGeometry(0.05, 0.08, 4); 
            topGeo.rotateX(Math.PI);
          }

          this.topMat = new THREE.MeshStandardMaterial({
            color: colorHex,
            emissive: colorHex,
            emissiveIntensity: 0.35, // Brillo superior base mejorado
            roughness: 0.1,
          });
          this.topMesh = new THREE.Mesh(topGeo, this.topMat);
          this.topMesh.position.y = 0.18;
          this.add(this.topMesh);

          // --- GHOST MESH: FIGURA FLOTANTE OPTIMIZADA PARA EFECTO DE PULSO ---
          const ghostGeo = topGeo.clone();
          this.ghostMat = new THREE.MeshStandardMaterial({
            color: colorHex,
            emissive: colorHex,
            emissiveIntensity: 1.2,
            transparent: true,
            opacity: 0,
            depthWrite: false, // Evita fallas de ordenación en transparencias
            roughness: 0.1
          });
          this.ghostMesh = new THREE.Mesh(ghostGeo, this.ghostMat);
          this.ghostMesh.position.y = 0.18;
          this.ghostMesh.visible = false;
          this.add(this.ghostMesh);

          // Brillo exterior interactivo (Highlight)
          let focusColorHex;
          switch (colorHex) {
            case 0x0044ff: focusColorHex = 0x47ccff; break; 
            case 0xff1111: focusColorHex = 0xff667f; break; 
            case 0xffaa00: focusColorHex = 0xffdf66; break; 
            case 0xffea00: focusColorHex = 0xffffff; break; 
            case 0x00e644: focusColorHex = 0x66ffaa; break; 
            default:
              const tempColor = new THREE.Color(colorHex);
              tempColor.offsetHSL(0, 0.2, 0.25);
              focusColorHex = tempColor.getHex();
          }

          const outlineMat = new THREE.MeshBasicMaterial({
            color: focusColorHex,
            side: THREE.BackSide,
            transparent: true,
            opacity: 0.75,
            blending: THREE.AdditiveBlending
          });

          const outlineBodyGeo = new THREE.CylinderGeometry(0.043, 0.043, 0.286, 16);
          this.outlineBody = new THREE.Mesh(outlineBodyGeo, outlineMat);
          this.outlineBody.visible = false;
          this.add(this.outlineBody);

          const outlineTopGeo = topGeo.clone();
          outlineTopGeo.scale(1.15, 1.15, 1.15);
          this.outlineTop = new THREE.Mesh(outlineTopGeo, outlineMat);
          this.outlineTop.position.y = 0.18;
          this.outlineTop.visible = false;
          this.add(this.outlineTop);

          // Colisionador invisible ampliado para mandos de VR
          const hitGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.45, 8);
          const hitMat = new THREE.MeshBasicMaterial({
            transparent: true,
            opacity: 0.0,
            depthWrite: false,
            depthTest: false
          });
          this.hitMesh = new THREE.Mesh(hitGeo, hitMat);
          this.add(this.hitMesh);

          this.bodyMesh.raycast = () => {};
          this.topMesh.raycast = () => {};
          this.ghostMesh.raycast = () => {};
          this.outlineBody.raycast = () => {};
          this.outlineTop.raycast = () => {};
        }

        // MODIFICADO: Simplificado setHovered para evitar sobreescribir permanentemente el color de emisión a negro.
        // Toda la lógica de colores y brillos ahora se maneja de manera centralizada en la función update() del Script.
        setHovered(isHovered) {
          this.outlineBody.visible = isHovered;
          this.outlineTop.visible = isHovered;
        }

        updateFeedback(distanceToActiveBase, isTargetingActive) {
          const maxDistance = 0.6;
          let factor = 0;

          if (isTargetingActive) {
            factor = Math.max(0, 1 - (distanceToActiveBase / maxDistance));
          }

          if (this.outlineBody.visible) {
            this.topMat.emissiveIntensity = Math.max((factor * 4.0) + 0.35, 1.0);
          } else {
            this.topMat.emissiveIntensity = (factor * 4.0) + 0.35;
          }
        }
      }


      class TotemExperience extends xb.Script {
        constructor() {
          super();
          this.totems = [];
          this.activeBases = []; 
          this.grabbedMap = new Map();
          this.sequencer = new SpatialSequencer();

          // Estructura para registrar los aros de luz de los altavoces
          this.speakerGlows = [];

          // Pantalla visualizadora de Audio
          this.visualizerCanvas = null;
          this.visualizerCtx = null;
          this.visualizerTex = null;
          this.visualizerScreen = null;
          this.visualizerBarsCount = 16;
          this.visualizerFallbacks = new Array(this.visualizerBarsCount).fill(0);

          // Visualizador dinámico en el piso (Cascada bilateral que recorre todo el piso de forma lineal y masiva)
          this.floorCanvas = null;
          this.floorCtx = null;
          this.floorTex = null;
          this.floorHistorySize = 16; // 16 filas para llenar el plano completo
          this.floorHistory = Array(this.floorHistorySize).fill(null).map(() => Array(this.visualizerBarsCount).fill(0));

          // Estructura de mallas de figuras flotantes activas
          this.floatingShapes = [];
          this.welcomePanel = null;
          this.welcomeBtnMesh = null; // Colisionador físico personalizado para "ENTENDIDO"
        }

        init() {
          // Luz ambiental e iluminación se mantienen tal como estaban reguladas
          const hemiLight = new THREE.HemisphereLight(0xffffff, 0x222233, 1.04);
          this.add(hemiLight);

          const dirLight = new THREE.DirectionalLight(0xffffff, 0.76);
          dirLight.position.set(1.5, 3, 1);
          this.add(dirLight);

          // Configuración básica de categorías de mezcla
          const categoriesConfig = [
            { id: 'harmony',    label: 'Armonías',  color: 0xffaa00, angleInDegrees: 36, img: 'https://raw.githubusercontent.com/juanienriquez/archivos-tp5/a7e7bd0e681131446067d2f338a3c9db8353d7a8/ARMON%C3%8DAS.jpg' },  
            { id: 'voice',      label: 'Voz',       color: 0xffea00, angleInDegrees: 108, img: 'https://raw.githubusercontent.com/juanienriquez/archivos-tp5/a7e7bd0e681131446067d2f338a3c9db8353d7a8/VOZ.jpg' }, 
            { id: 'fx',         label: 'Efectos',   color: 0x00e644, angleInDegrees: 180, img: 'https://raw.githubusercontent.com/juanienriquez/archivos-tp5/2c2b1fb0aaa9bb174e8f4ad5a4cdc1ee84f9b682/EFECTOS.jpg' }, 
            { id: 'bass',       label: 'Bajos',     color: 0xff1111, angleInDegrees: 252, img: 'https://raw.githubusercontent.com/juanienriquez/archivos-tp5/a7e7bd0e681131446067d2f338a3c9db8353d7a8/BAJOS.jpg' }, 
            { id: 'percussion', label: 'Percusión', color: 0x0044ff, angleInDegrees: 324, img: 'https://raw.githubusercontent.com/juanienriquez/archivos-tp5/a7e7bd0e681131446067d2f338a3c9db8353d7a8/PERCUSI%C3%93N.jpg' }  
          ];

          // 1. CONSTRUCCIÓN DE LA HABITACIÓN CON LA GRILLA DE PANELES 5X3
          this.buildStudioRoom();

          // 2. CREAR TEXTURA DE VISUALIZADOR PARA TODO EL PISO (Plano de pared a pared)
          this.createFloorVisualizer();

          // 3. PEDESTALES DE MEZCLA ACTIVA CON FOCOS DE LUZ LOCALIZADOS
          const activeRadius = 1.20;
          const pedestalY = 0.90;
          const pedestalAngles = [0, 72, 144, 216, 288]; 

          for (let i = 0; i < 5; i++) {
            const angleRad = (pedestalAngles[i] * Math.PI) / 180;
            const x = Math.sin(angleRad) * activeRadius;
            const z = -Math.cos(angleRad) * activeRadius;
            const basePos = new THREE.Vector3(x, pedestalY, z);

            // Columna de piedra oscura
            const columnGeo = new THREE.CylinderGeometry(0.12, 0.14, pedestalY, 16);
            const columnMat = new THREE.MeshStandardMaterial({
              color: 0x1d1e22, 
              roughness: 0.85,
              metalness: 0.15
            });
            const column = new THREE.Mesh(columnGeo, columnMat);
            column.position.set(x, pedestalY / 2, z);
            this.add(column);

            // Plato metálico
            const plateGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.02, 24);
            const activePlateMat = new THREE.MeshStandardMaterial({
              color: 0x2e3138,
              roughness: 0.4,
              metalness: 0.7
            });
            const activePlate = new THREE.Mesh(plateGeo, activePlateMat);
            activePlate.position.set(x, pedestalY + 0.01, z);
            this.add(activePlate);

            // Anillo luminoso interactivo ensanchado levemente con mezcla aditiva
            const activeRingGeo = new THREE.RingGeometry(0.065, 0.08, 32);
            activeRingGeo.rotateX(-Math.PI / 2);
            const activeRingMat = new THREE.MeshBasicMaterial({
              color: 0x111115, 
              side: THREE.DoubleSide,
              transparent: true,
              blending: THREE.AdditiveBlending // Brillo aditivo ideal para simular alta emisión
            });
            const activeRing = new THREE.Mesh(activeRingGeo, activeRingMat);
            activeRing.position.set(x, pedestalY + 0.022, z);
            this.add(activeRing);

            this.activeBases.push({
              position: basePos.clone(),
              ringMaterial: activeRingMat,
              dockedTotem: null,
              angleInDegrees: pedestalAngles[i],
              targetColor: new THREE.Color(0x111115)
            });
          }


          // 4. ESTANTES FLOTANTES DE SELECCIÓN DE TÓTEMS
          const shelfRadius = 1.20; 
          const shelfHeight = 0.025;
          const shelfWidth = 0.40;
          const shelfDepth = 0.16;

          const grayShelfMat = new THREE.MeshStandardMaterial({
            color: 0x3d414a, 
            roughness: 0.5,
            metalness: 0.4
          });

          const textureLoader = new THREE.TextureLoader();

          categoriesConfig.forEach((cat) => {
            const midAngle = (cat.angleInDegrees * Math.PI) / 180;
            const shelfX = Math.sin(midAngle) * shelfRadius;
            const shelfZ = -Math.cos(cat.angleInDegrees * Math.PI / 180) * shelfRadius;

            // Estante
            const shelfGeo = new THREE.BoxGeometry(shelfWidth, shelfHeight, shelfDepth);
            const shelfMesh = new THREE.Mesh(shelfGeo, grayShelfMat);
            shelfMesh.position.set(shelfX, 0.85, shelfZ);
            shelfMesh.lookAt(0, 0.85, 0);
            this.add(shelfMesh);

            // Cartel de imagen unificado para todas las categorías (con geometría dinámica)
            const boardGeo = new THREE.PlaneGeometry(0.32, 0.16); // Geometría base inicial
            const boardMat = new THREE.MeshBasicMaterial({ side: THREE.DoubleSide, transparent: false });
            const boardMesh = new THREE.Mesh(boardGeo, boardMat);
            this.add(boardMesh);
            
            textureLoader.load(
              cat.img, 
              (tex) => {
                tex.colorSpace = THREE.SRGBColorSpace;
                boardMat.map = tex;
                boardMat.needsUpdate = true;

                // 1. Obtener relación de aspecto original de la textura descargada para evitar estiramientos
                const img = tex.image;
                const aspect = img.width / img.height;

                // 2. Escalar la geometría preservando exactamente el ancho visual de 0.32m
                const targetWidth = 0.32;
                const targetHeight = targetWidth / aspect;

                boardMesh.geometry.dispose();
                boardMesh.geometry = new THREE.PlaneGeometry(targetWidth, targetHeight);

                // 3. Alinear borde superior de señalética con borde superior de estante (y = 0.8625)
                // Offset de profundidad local z = 0.081m (en frente del estante por 1mm para evitar z-fighting)
                const localYOffset = 0.0125 - (targetHeight / 2);
                boardMesh.position.copy(shelfMesh.position).add(
                  new THREE.Vector3(0, localYOffset, 0.081).applyQuaternion(shelfMesh.quaternion)
                );
                boardMesh.rotation.copy(shelfMesh.rotation);
              },
              undefined,
              () => {
                // Fallback de respaldo en caso de que falle la carga de la imagen (manteniendo relación de aspecto 2:1)
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#' + cat.color.toString(16).padStart(6, '0');
                ctx.fillRect(0, 0, 256, 128);
                ctx.fillStyle = '#000000';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(cat.label.toUpperCase(), 128, 32);
                
                const tex = new THREE.CanvasTexture(canvas);
                boardMat.map = tex;
                boardMat.needsUpdate = true;

                const targetWidth = 0.32;
                const targetHeight = 0.16;

                boardMesh.geometry.dispose();
                boardMesh.geometry = new THREE.PlaneGeometry(targetWidth, targetHeight);

                const localYOffset = 0.0125 - (targetHeight / 2);
                boardMesh.position.copy(shelfMesh.position).add(
                  new THREE.Vector3(0, localYOffset, 0.081).applyQuaternion(shelfMesh.quaternion)
                );
                boardMesh.rotation.copy(shelfMesh.rotation);
              }
            );

            // Crear los 3 tótems correspondientes a cada estante
            const localOffsets = [-0.11, 0, 0.11];

            for (let rowIndex = 0; rowIndex < 3; rowIndex++) {
              const offsetLocal = new THREE.Vector3(localOffsets[rowIndex], 0.14, 0);
              offsetLocal.applyQuaternion(shelfMesh.quaternion);

              const totemSpawnPos = new THREE.Vector3(shelfX, 0.85, shelfZ).add(offsetLocal);
              const name = `${cat.id}_var_${rowIndex}`;

              const totem = new TotemElement(cat.color, cat.id, rowIndex, totemSpawnPos, name);
              this.add(totem);
              this.totems.push(totem);

              this.sequencer.registerTotem(name, cat.id, rowIndex, () => {
                const worldPos = new THREE.Vector3();
                totem.getWorldPosition(worldPos);
                return worldPos;
              });
            }
          });


          // 5. CREACIÓN DE LA INTERFAZ DE MONITOREO Y AUDIO VISUALIZER
          this.createUI();
          this.createAudioVisualizerScreen();
          this.setupAutoplayTrigger();

          // 6. CARGAR OBJETOS EXTRA DEL ESTUDIO (SOLO ALTAVOCES - MICRÓFONOS ELIMINADOS)
          this.loadStudioProps();
        }

        buildStudioRoom() {
          const roomWidth = 5.6;
          const roomHeight = 3.2;

          // Suelo de cemento pulido cuadrado (MODIFICADO: Se oscureció el color a petición)
          const floorGeo = new THREE.BoxGeometry(roomWidth, 0.04, roomWidth);
          const floorMat = new THREE.MeshStandardMaterial({
            color: 0x121316, 
            roughness: 0.6,
            metalness: 0.3
          });
          const floorMesh = new THREE.Mesh(floorGeo, floorMat);
          floorMesh.position.y = -0.02;
          this.add(floorMesh);

          // Grid guía sutil
          const gridHelper = new THREE.GridHelper(roomWidth, 14, 0x3d414a, 0x22242a);
          gridHelper.position.y = 0.005;
          this.add(gridHelper);

          // Techo de concreto (MODIFICADO: Se oscureció el color a petición)
          const ceilingGeo = new THREE.BoxGeometry(roomWidth, 0.04, roomWidth);
          const ceilingMat = new THREE.MeshStandardMaterial({
            color: 0x1f2025, 
            roughness: 0.8,
            metalness: 0.05
          });
          const ceilingMesh = new THREE.Mesh(ceilingGeo, ceilingMat);
          ceilingMesh.position.y = roomHeight;
          this.add(ceilingMesh);

          // Estructura de paredes de fondo
          const panelBackingMat = new THREE.MeshStandardMaterial({
            color: 0x0f1013, 
            roughness: 0.95
          });

          const wallsData = [
            { pos: [0, roomHeight/2, -roomWidth/2], rot: [0, 0, 0] },         // Trasera
            { pos: [0, roomHeight/2, roomWidth/2], rot: [0, Math.PI, 0] },     // Delantera
            { pos: [-roomWidth/2, roomHeight/2, 0], rot: [0, Math.PI/2, 0] },  // Izquierda
            { pos: [roomWidth/2, roomHeight/2, 0], rot: [0, -Math.PI/2, 0] }   // Derecha
          ];

          // Carga del modelo PanelSonido.glb de forma asincrónica
          const loader = new GLTFLoader();
          const glbUrl = "https://raw.githubusercontent.com/juanienriquez/archivos-tp5/859f4ef24dd8e34e0869b605ca72fb665668a3b6/PanelSonido.glb";

          loader.load(glbUrl, (gltf) => {
            const panelModel = gltf.scene;

            // Medir el modelo nativo para reescalarlo proporcionalmente a los paneles acústicos de las paredes
            const box = new THREE.Box3().setFromObject(panelModel);
            const size = new THREE.Vector3();
            box.getSize(size);
            const center = new THREE.Vector3();
            box.getCenter(center);

            const targetWidth = 1.0;
            const targetHeight = 0.95;
            const scaleX = targetWidth / (size.x || 1);
            const scaleY = targetHeight / (size.y || 1);
            
            const scaleFactor = Math.min(scaleX, scaleY);

            wallsData.forEach((w) => {
              const wallGroup = new THREE.Group();
              wallGroup.position.set(w.pos[0], w.pos[1], w.pos[2]);
              wallGroup.rotation.set(w.rot[0], w.rot[1], w.rot[2]);

              // Muro de fondo
              const backPlane = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomHeight), panelBackingMat);
              wallGroup.add(backPlane);

              // Creación de la grilla de paneles acústicos de 5 horizontales x 3 verticales
              const cols = 5;
              const rows = 3;
              const colSpacing = 1.08; 
              const rowSpacing = 0.98; 

              for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                  const panelContainer = new THREE.Group();
                  const clonedPanel = panelModel.clone();
                  
                  clonedPanel.position.copy(center).negate();
                  clonedPanel.scale.setScalar(scaleFactor);

                  clonedPanel.rotation.x = Math.PI / 2;
                  clonedPanel.rotation.y = 0;
                  clonedPanel.rotation.z = 0;

                  panelContainer.add(clonedPanel);

                  panelContainer.rotation.z = Math.PI / 2;

                  const xOffset = (c - (cols - 1) / 2) * colSpacing;
                  const yOffset = (r - (rows - 1) / 2) * rowSpacing;

                  panelContainer.position.set(xOffset, yOffset, 0.04);
                  wallGroup.add(panelContainer);
                }
              }

              // Estructura decorativa de marcos de madera
              const woodMat = new THREE.MeshStandardMaterial({ color: 0x2d1f18, roughness: 0.7 });
              const bottomViga = new THREE.Mesh(new THREE.BoxGeometry(roomWidth, 0.08, 0.06), woodMat);
              bottomViga.position.set(0, -roomHeight/2 + 0.04, 0.03);
              wallGroup.add(bottomViga);

              const topViga = bottomViga.clone();
              topViga.position.y = roomHeight/2 - 0.04;
              wallGroup.add(topViga);

              this.add(wallGroup);
            });
          }, undefined, (err) => {
            console.warn("Fallo al descargar PanelSonido.glb, aplicando paredes básicas negras de respaldo", err);
            wallsData.forEach((w) => {
              const wallGroup = new THREE.Group();
              wallGroup.position.set(w.pos[0], w.pos[1], w.pos[2]);
              wallGroup.rotation.set(w.rot[0], w.rot[1], w.rot[2]);
              
              const backPlane = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomHeight), panelBackingMat);
              wallGroup.add(backPlane);
              this.add(wallGroup);
            });
          });

          // Luminarias LED de techo
          const lightBarGeo = new THREE.BoxGeometry(3.0, 0.04, 0.08);
          const lightBarMat = new THREE.MeshBasicMaterial({ color: 0xcccccc }); 
          
          const neonLeft = new THREE.Mesh(lightBarGeo, lightBarMat);
          neonLeft.position.set(-1.2, roomHeight - 0.03, 0);
          this.add(neonLeft);

          const neonRight = neonLeft.clone();
          neonRight.position.set(1.2, roomHeight - 0.03, 0);
          this.add(neonRight);

          // Luces del techo originales conservadas
          const ceilingLightL = new THREE.PointLight(0xfff5e6, 1.28, 8.0); 
          ceilingLightL.position.set(-1.2, roomHeight - 0.2, 0);
          this.add(ceilingLightL);

          const ceilingLightR = new THREE.PointLight(0xfff5e6, 1.28, 8.0); 
          ceilingLightR.position.set(1.2, roomHeight - 0.2, 0);
          this.add(ceilingLightR);
        }

        loadStudioProps() {
          const loader = new GLTFLoader();
          const speakerUrl = "https://raw.githubusercontent.com/juanienriquez/archivos-tp5/ed6a29e3ee907d3eac04cdb2e251b5db314345e9/Altavoz2.glb";

          const speakerPositions = [
            new THREE.Vector3(-2.45, 0, -2.45),
            new THREE.Vector3(2.45, 0, -2.45),
            new THREE.Vector3(-2.45, 0, 2.45),
            new THREE.Vector3(2.45, 0, 2.45)
          ];

          speakerPositions.forEach((pos) => {
            loader.load(speakerUrl, (gltf) => {
              const model = gltf.scene;

              // Obtener dimensiones de la caja contenedora del altavoz
              const box = new THREE.Box3().setFromObject(model);
              const height = box.max.y - box.min.y;
              const minY = box.min.y;

              // Escalado proporcional a un tamaño óptimo (1.1 metros de alto)
              const scaleFactor = 1.1 / (height || 1);
              model.scale.setScalar(scaleFactor);

              // Posicionamiento en el suelo apoyado en y = 0
              model.position.copy(pos);
              model.position.y = -minY * scaleFactor;

              // Apuntar diagonalmente hacia el centro del estudio
              const centerTarget = new THREE.Vector3(0, model.position.y, 0);
              model.lookAt(centerTarget);
              // Rotar 180 grados (Math.PI) para apuntar hacia el centro/usuario
              model.rotateY(Math.PI);

              // Aro de neón decorativo ensanchado con mezcla aditiva para una emisión simulada masiva
              const ringGeo = new THREE.RingGeometry(0.18, 0.28, 32);
              ringGeo.rotateX(-Math.PI / 2);
              const ringMat = new THREE.MeshBasicMaterial({
                color: 0xdfceff, // Modificado a color violáceo blanquecino inicial
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending // Blending aditivo que simula luz pura emitida
              });
              const baseGlow = new THREE.Mesh(ringGeo, ringMat);
              baseGlow.position.y = 0.01; 
              model.add(baseGlow);

              this.speakerGlows.push(ringMat);

              this.add(model);
            }, undefined, (err) => {
              console.warn("Fallo al cargar Altavoz2.glb:", err);
            });
          });
        }

        // Retorna un color degradado suave para las columnas LED encendidas
        getGlowColor(index) {
          const colors = [
            '#9a24ff', '#9a24ff', '#b336ff', // Columnas 0-2 (Violeta)
            '#ff1df3', '#ff1df3', '#ff42f5', // Columnas 3-5 (Rosa)
            '#ff1155', '#ff1155',             // Columnas 6-7 (Rojo)
            '#ff7700', '#ff7700',             // Columnas 8-9 (Naranja)
            '#ffdd00', '#ffdd00',             // Columnas 10-11 (Amarillo)
            '#00ff44', '#00ff44',             // Columnas 12-13 (Verde)
            '#00bbff', '#00bbff'              // Columnas 14-15 (Celeste/Cian)
          ];
          return colors[index] || '#00bbff';
        }

        drawVisualizer(now) {
          const ctx = this.visualizerCtx;
          const w = this.visualizerCanvas.width;
          const h = this.visualizerCanvas.height;

          // Fondo del visualizador oscuro solicitado: #18192A
          ctx.fillStyle = '#18192A';
          ctx.fillRect(0, 0, w, h);

          // Grid de fondo sutil al estilo monitor analógico
          ctx.strokeStyle = '#22243d';
          ctx.lineWidth = 1.0;
          for (let y = 16; y < h; y += 16) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(w, y);
            ctx.stroke();
          }

          let currentFrequencies = new Array(this.visualizerBarsCount).fill(0);
          
          if (this.sequencer.analyser && this.sequencer.isPlaying) {
            this.sequencer.analyser.getByteFrequencyData(this.sequencer.dataArray);
            const fftData = this.sequencer.dataArray;
            
            // Mapeo no lineal exponencial + High-End boost para que toda la derecha encienda perfectamente
            for (let i = 0; i < this.visualizerBarsCount; i++) {
              let binIndex = Math.floor(Math.pow(i / (this.visualizerBarsCount - 1), 1.5) * 20);
              if (binIndex >= fftData.length) binIndex = fftData.length - 1;
              
              let val = fftData[binIndex] || 0;
              const boost = 1.0 + (i / (this.visualizerBarsCount - 1)) * 3.5;
              let boostedVal = val * boost;

              // Brillo de acople armónico para frecuencias altas
              if (i > 8 && fftData[2] > 50) {
                boostedVal += (fftData[2] * 0.15) * (Math.sin(now * 0.02 + i) * 0.3 + 0.7);
              }

              currentFrequencies[i] = Math.min(255, boostedVal) / 255;
            }
          } else {
            // Animación de standby
            for (let i = 0; i < this.visualizerBarsCount; i++) {
              currentFrequencies[i] = (Math.sin(now * 0.003 + i * 0.4) * 0.5 + 0.5) * 0.15;
            }
          }

          // Distribución del grid de cápsulas (16 columnas x 10 filas)
          const cols = 16;
          const rows = 10;
          const gapX = 5;
          const gapY = 5;
          const barW = 25;
          const barH = 22;

          const startX = (w - (cols * barW + (cols - 1) * gapX)) / 2;
          const startY = (h - (rows * barH + (rows - 1) * gapY)) / 2;

          for (let col = 0; col < cols; col++) {
            const freqVal = currentFrequencies[col] || 0;
            
            if (freqVal > this.visualizerFallbacks[col]) {
              this.visualizerFallbacks[col] = freqVal;
            } else {
              this.visualizerFallbacks[col] -= 0.05;
              if (this.visualizerFallbacks[col] < 0) this.visualizerFallbacks[col] = 0;
            }

            const targetLeds = Math.round(this.visualizerFallbacks[col] * rows);

            for (let row = 0; row < rows; row++) {
              const x = startX + col * (barW + gapX);
              const y = h - startY - barH - row * (barH + gapY);

              const isActive = row < targetLeds;

              if (isActive) {
                // LED Encendido (glowing dinámico según espectro)
                ctx.fillStyle = this.getGlowColor(col);
              } else {
                // LED Apagado oscuro solicitado: #42456C
                ctx.fillStyle = '#42456C';
              }

              // Dibujar cápsula con esquinas muy suavizadas (radio de 5px)
              ctx.beginPath();
              ctx.roundRect(x, y, barW, barH, 5);
              ctx.fill();
            }
          }

          // DIBUJAR MARCO CON DEGRADADO DE NEÓN CONTINUO (image_9d2427.png)
          const borderGrad = ctx.createLinearGradient(0, 0, w, h);
          borderGrad.addColorStop(0.0, '#c066ff'); // Violeta (arriba-izquierda)
          borderGrad.addColorStop(0.2, '#ff1df3'); // Rosa
          borderGrad.addColorStop(0.4, '#ff1155'); // Rojo/Naranja
          borderGrad.addColorStop(0.6, '#ffaa00'); // Amarillo
          borderGrad.addColorStop(0.8, '#00ff44'); // Verde
          borderGrad.addColorStop(1.0, '#00bbff'); // Celeste (abajo-derecha)

          ctx.strokeStyle = borderGrad;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.roundRect(8, 8, w - 16, h - 16, 16);
          ctx.stroke();

          this.visualizerTex.needsUpdate = true;
        }


        drawFloorVisualizer(now) {
          const ctx = this.floorCtx;
          const w = this.floorCanvas.width;
          const h = this.floorCanvas.height;
          const cx = w / 2;
          const cy = h / 2;

          // Limpiar el canvas con un negro apagado para que no cause clipping en blending aditivo
          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, w, h);

          let currentFrequencies = new Array(this.visualizerBarsCount).fill(0);
          
          if (this.sequencer.analyser && this.sequencer.isPlaying) {
            this.sequencer.analyser.getByteFrequencyData(this.sequencer.dataArray);
            const fftData = this.sequencer.dataArray;
            
            for (let i = 0; i < this.visualizerBarsCount; i++) {
              let binIndex = Math.floor(Math.pow(i / (this.visualizerBarsCount - 1), 1.5) * 20);
              if (binIndex >= fftData.length) binIndex = fftData.length - 1;
              const val = (fftData[binIndex] || 0) / 255;
              
              // === NUEVA CONFIGURACIÓN DE ALTA SENSIBILIDAD PARA EL SUELO ===
              const gainVal = val * 1.6;
              currentFrequencies[i] = Math.min(1.0, Math.pow(gainVal, 1.2));
            }
          } else {
            // Pulso ambiental de standby si la mezcla está quieta
            for (let i = 0; i < this.visualizerBarsCount; i++) {
              currentFrequencies[i] = (Math.sin(now * 0.003 + i * 0.4) * 0.5 + 0.5) * 0.15;
            }
          }

          // Desplazar el historial de cascada hacia los lados (pop y unshift)
          this.floorHistory.unshift(currentFrequencies);
          this.floorHistory.pop();

          // DIBUJAR LA MATRIZ RECTANGULAR EN TODO EL SUELO
          const cellW = w / this.visualizerBarsCount;
          const cellH = (h / 2) / this.floorHistorySize;

          for (let col = 0; col < this.visualizerBarsCount; col++) {
            const colColor = this.getFloorColor(col, 1.0);

            for (let row = 0; row < this.floorHistorySize; row++) {
              const intensity = this.floorHistory[row][col];
              
              if (intensity > 0.01) {
                const fadeFactor = 1.0 - (row / (this.floorHistorySize - 1)) * 0.55;
                ctx.fillStyle = colColor;
                ctx.globalAlpha = intensity * fadeFactor * 0.85; // Opacidad base de mayor brillantez

                const x = col * cellW;
                
                const yForward = cy + (row * cellH);
                const yBackward = cy - ((row + 1) * cellH);

                ctx.beginPath();
                ctx.roundRect(x + 2, yForward + 1, cellW - 4, cellH - 2, 2);
                ctx.fill();

                ctx.beginPath();
                ctx.roundRect(x + 2, yBackward + 1, cellW - 4, cellH - 2, 2);
                ctx.fill();
              }
            }
          }

          ctx.globalAlpha = 1.0;

          // ENERGÍA DE ENLACE LÁSER ENTRE CENTRO Y PEDESTALES
          this.activeBases.forEach((base) => {
            const angleRad = (base.angleInDegrees * Math.PI) / 180;
            const length = 210; 
            const targetX = cx + Math.sin(angleRad) * length;
            const targetY = cy - Math.cos(angleRad) * length;

            if (base.dockedTotem) {
              let basePulse = 0.0;
              const synthObj = this.sequencer.activeSynths.get(base.dockedTotem.totemName);
              if (synthObj && synthObj.lastTriggerTime) {
                const elapsed = now - synthObj.lastTriggerTime;
                basePulse = Math.max(0, 1.0 - (elapsed / 220)); 
              }

              const hexStr = base.dockedTotem.colorHex.toString(16).padStart(6, '0');
              const r = parseInt(hexStr.slice(0, 2), 16);
              const g = parseInt(hexStr.slice(2, 4), 16);
              const b = parseInt(hexStr.slice(4, 6), 16);

              ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${0.25 + basePulse * 0.75})`;
              ctx.lineWidth = 3.0 + basePulse * 8;
              ctx.beginPath();
              ctx.moveTo(cx, cy);
              ctx.lineTo(targetX, targetY);
              ctx.stroke();

              if (basePulse > 0.0) {
                const travelProgress = 1.0 - basePulse; 
                const photonX = cx + Math.sin(angleRad) * (length * travelProgress);
                const photonY = cy - Math.cos(angleRad) * (length * travelProgress);

                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(photonX, photonY, 6 + basePulse * 5, 0, Math.PI * 2);
                ctx.fill();
              }
            }
          });

          this.floorTex.needsUpdate = true;
        }

        getFloorColor(index, intensity) {
          let r, g, b;
          if (index < 3) {
            r = 154; g = 36; b = 255; 
          } else if (index < 7) {
            r = 255; g = 17; b = 85;  
          } else if (index < 11) {
            r = 0; g = 255; b = 68;   
          } else {
            r = 0; g = 187; b = 255;  
          }
          return `rgba(${r}, ${g}, ${b}, ${intensity * 0.5})`;
        }


        createUI() {
          const panel = new xb.SpatialPanel({
            width: 2.2, 
            height: 1.0, 
            backgroundColor: '#00000000', 
          });
          panel.position.set(0, 1.5, -0.7); 
          this.add(panel);
          this.welcomePanel = panel;

          const grid = panel.addGrid();
          
          grid.addRow({weight: 1.0}).addImage({
            src: 'https://raw.githubusercontent.com/juanienriquez/archivos-tp5/43d27a8ec96211a82d202d0a0f3b8cc96b969b4f/Inicio.png'
          });

          // Colisionador tridimensional invisible perfectamente calibrado sobre el botón "ENTENDIDO"
          const btnGeo = new THREE.PlaneGeometry(0.52, 0.16);
          const btnMat = new THREE.MeshBasicMaterial({
            transparent: true,
            opacity: 0.0,
            depthWrite: false
          });
          this.welcomeBtnMesh = new THREE.Mesh(btnGeo, btnMat);
          this.welcomeBtnMesh.position.set(0, -0.39, 0.02);
          this.welcomePanel.add(this.welcomeBtnMesh);

          panel.updateLayouts();
        }

        setupAutoplayTrigger() {
          const unlock = () => {
            this.sequencer.initContext();
            window.removeEventListener('click', unlock);
            window.removeEventListener('touchstart', unlock);
          };
          window.addEventListener('click', unlock);
          window.addEventListener('touchstart', unlock);
        }


        onSelectStart(event) {
          const controller = event.target;

          if (this.welcomePanel && this.welcomeBtnMesh) {
            const btnIntersection = xb.core.user.select(this.welcomeBtnMesh, controller);
            if (btnIntersection) {
              this.remove(this.welcomePanel);
              this.welcomePanel = null;
              this.welcomeBtnMesh = null;
              this.sequencer.initContext(); // Inicializar y desbloquear audio
              return; 
            }
          }

          let selectedTotem = null;

          for (const totem of this.totems) {
            const intersection = xb.core.user.select(totem.hitMesh, controller);
            if (intersection) {
              selectedTotem = totem;
              break;
            }
          }

          if (selectedTotem) {
            this.sequencer.initContext();
            selectedTotem.isGrabbed = true;

            this.activeBases.forEach(base => {
              if (base.dockedTotem === selectedTotem) {
                base.dockedTotem = null;
              }
            });

            const grabDistance = controller.position.distanceTo(selectedTotem.position);
            const relativeRotation = new THREE.Quaternion().copy(controller.quaternion).invert().multiply(selectedTotem.quaternion);

            this.grabbedMap.set(controller, { 
              totem: selectedTotem, 
              grabDistance,
              relativeRotation
            });
          }
        }

        onSelecting(event) {
          const controller = event.target;
          const grabData = this.grabbedMap.get(controller);
          
          if (grabData) {
            const { totem, grabDistance, relativeRotation } = grabData;
            const rayDirection = new THREE.Vector3(0, 0, -1).applyQuaternion(controller.quaternion);
            const targetPosition = new THREE.Vector3()
              .copy(controller.position)
              .addScaledVector(rayDirection, grabDistance);
            
            totem.position.lerp(targetPosition, 0.25);
            const targetRotation = new THREE.Quaternion().copy(controller.quaternion).multiply(relativeRotation);
            totem.quaternion.slerp(targetRotation, 0.2);
          }
        }

        onSelectEnd(event) {
          const controller = event.target;
          const grabData = this.grabbedMap.get(controller);

          if (grabData) {
            const { totem } = grabData;
            totem.isGrabbed = false;
            this.grabbedMap.delete(controller);

            let closestBase = null;
            let minDistance = 0.35;

            this.activeBases.forEach(base => {
              const baseTopPos = new THREE.Vector3(base.position.x, base.position.y + 0.14, base.position.z);
              const dist = totem.position.distanceTo(baseTopPos);

              if (dist < minDistance) {
                minDistance = dist;
                closestBase = base;
              }
            });

            if (closestBase) {
              const targetPos = new THREE.Vector3(closestBase.position.x, closestBase.position.y + 0.14, closestBase.position.z);
              
              // REGLA 1: Swapping por PEDESTAL OCUPADO
              this.totems.forEach(other => {
                if (other !== totem && other.targetDockPosition.equals(targetPos)) {
                  other.targetDockPosition.copy(other.initialPosition);
                  other.isDockedActive = false;
                  this.sequencer.setTotemState(other.totemName, false);
                }
              });

              // REGLA 2: Swapping por CATEGORÍA DUPLICADA
              this.totems.forEach(other => {
                if (other !== totem && other.category === totem.category) {
                  this.activeBases.forEach(base => {
                    const baseTopPos = new THREE.Vector3(base.position.x, base.position.y + 0.14, base.position.z);
                    if (other.targetDockPosition.equals(baseTopPos)) {
                      other.targetDockPosition.copy(other.initialPosition);
                      other.isDockedActive = false;
                      this.sequencer.setTotemState(other.totemName, false);
                    }
                  });
                }
              });

              totem.targetDockPosition.copy(targetPos);
            } else {
              totem.targetDockPosition.copy(totem.initialPosition);
            }
          }
        }


        update() {
          const dt = xb.getDeltaTime();
          const now = performance.now();

          // Renderizar animación del analizador
          this.drawVisualizer(now);
          this.drawFloorVisualizer(now);

          if (xb.core.camera) {
            this.sequencer.updateListener(xb.core.camera);
          }

          this.activeBases.forEach(base => {
            base.dockedTotem = null;
          });

          // Detección de enfoque
          const hoveredTotems = new Set();
          
          for (const controller of xb.core.input.controllers) {
            const grabData = this.grabbedMap.get(controller);
            if (grabData) {
              hoveredTotems.add(grabData.totem);
              continue;
            }

            for (const totem of this.totems) {
              const intersection = xb.core.user.select(totem.hitMesh, controller);
              if (intersection) {
                hoveredTotems.add(totem);
                break; 
              }
            }
          }

          this.totems.forEach((totem) => {
            totem.setHovered(hoveredTotems.has(totem));

            let targetedBase = null;
            this.activeBases.forEach(base => {
              const baseTopPos = new THREE.Vector3(base.position.x, base.position.y + 0.14, base.position.z);
              if (totem.targetDockPosition.equals(baseTopPos)) {
                targetedBase = base;
              }
            });

            const isTargetingActive = (targetedBase !== null);
            const currentTarget = isTargetingActive ? totem.targetDockPosition : totem.initialPosition;
            const distanceToTarget = totem.position.distanceTo(currentTarget);

            if (!totem.isGrabbed) {
              totem.position.lerp(currentTarget, 10 * dt);
              totem.quaternion.slerp(new THREE.Quaternion(), 10 * dt);
            }

            const isDocked = isTargetingActive && (!totem.isGrabbed) && (distanceToTarget < 0.12);
            
            // --- DETECCION DE CONEXION DE UN TOTEM ---
            if (isDocked && !totem.wasDockedPreviously) {
              totem.dockedTime = now;
              totem.wasDockedPreviously = true;
            } else if (!isDocked) {
              totem.wasDockedPreviously = false;
            }

            totem.isDockedActive = isDocked;
            this.sequencer.setTotemState(totem.totemName, isDocked);

            if (isDocked && targetedBase) {
              targetedBase.dockedTotem = totem;
            }

            // Animación física sincronizada con el secuenciador
            let beatPulse = 0.0;
            let elapsed = 0;
            const synthObj = this.sequencer.activeSynths.get(totem.totemName);
            if (synthObj && synthObj.isPlacedActive && synthObj.lastTriggerTime) {
              elapsed = now - synthObj.lastTriggerTime;
              beatPulse = Math.max(0, 1.0 - (elapsed / 250)); 
            }

            // MODIFICADO: Ahora pulsamos todo el tótem (cuerpo, cristal superior, outlines y ghost) de manera unificada
            const scaleScalar = 1.0 + (beatPulse * 0.35);
            totem.scale.set(scaleScalar, scaleScalar, scaleScalar);

            totem.updateFeedback(distanceToTarget, isTargetingActive);

            // --- ANIMACIÓN DEL GHOST MESH FLOTANTE ---
            if (isDocked && elapsed < 1000 && synthObj && synthObj.lastTriggerTime) {
              totem.ghostMesh.visible = true;

              // Flota gradualmente hacia arriba (desde y = 0.18 hasta un desfase de 0.35 unidades)
              const floatProgress = elapsed / 1000;
              totem.ghostMesh.position.y = 0.18 + floatProgress * 0.35;

              // Rotación dinámica para el efecto etéreo en el aire
              totem.ghostMesh.rotation.y = floatProgress * Math.PI * 2;
              totem.ghostMesh.rotation.z = floatProgress * Math.PI;

              // Opacidad: constante (0.5) los primeros 500ms, y luego fade-out a 0 en los últimos 500ms
              let targetOpacity = 0.5;
              if (elapsed > 500) {
                targetOpacity = 0.5 * (1.0 - (elapsed - 500) / 500);
              }
              totem.ghostMat.opacity = targetOpacity;
            } else {
              totem.ghostMesh.visible = false;
              totem.ghostMat.opacity = 0;
            }

            // MODIFICADO: Control centralizado de brillo y color de emisión de los materiales.
            // Esto soluciona por completo el bug donde el cuerpo del tótem dejaba de brillar al soltarlo en el pedestal.
            if (isDocked) {
              // Forzar que el material del cuerpo cilíndrico siempre recupere su color emisivo para brillar al unísono
              totem.bodyMesh.material.emissive.setHex(totem.colorHex);

              // --- CÁLCULO DE DESTELLO BRILLANTE AL CONECTARSE ---
              let connectionFlash = 0.0;
              const flashDuration = 800; // 0.8 segundos
              const timeSinceDock = now - totem.dockedTime;

              if (timeSinceDock < flashDuration) {
                const progress = timeSinceDock / flashDuration;
                connectionFlash = Math.pow(1.0 - progress, 3.0) * 8.0; // Pico de destello intenso x8
              }

              // Brillo de emisión en cristal superior y cilindro base (reactivo a la música + destello de conexión inicial)
              totem.topMat.emissiveIntensity = 0.5 + connectionFlash + (beatPulse * 3.5);
              totem.bodyMesh.material.emissiveIntensity = 0.35 + (connectionFlash * 0.5) + (beatPulse * 1.65);
            } else {
              // Si no está acoplado en el pedestal, respetar hover/reposo en estante
              if (hoveredTotems.has(totem)) {
                // Glow al pasar el puntero/mando por encima (resaltado interactivo)
                totem.bodyMesh.material.emissive.setHex(totem.colorHex).multiplyScalar(0.3);
                totem.bodyMesh.material.emissiveIntensity = 0.45;
                totem.topMat.emissiveIntensity = 1.0;
              } else {
                // Reposo absoluto en el estante (emisión apagada)
                totem.bodyMesh.material.emissive.setHex(0x000000);
                totem.bodyMesh.material.emissiveIntensity = 0.15;
                totem.topMat.emissiveIntensity = 0.35;
              }
            }
          });

          // Actualización de pedestales con transición gradual (Lerp)
          this.activeBases.forEach((base) => {
            if (base.dockedTotem) {
              let basePulse = 0.0;
              const synthObj = this.sequencer.activeSynths.get(base.dockedTotem.totemName);
              if (synthObj && synthObj.lastTriggerTime) {
                const elapsed = now - synthObj.lastTriggerTime;
                basePulse = Math.max(0, 1.0 - (elapsed / 200)); 
              }

              let baseFlash = 0.0;
              const flashDuration = 800;
              const timeSinceDock = now - base.dockedTotem.dockedTime;

              if (timeSinceDock < flashDuration) {
                const progress = timeSinceDock / flashDuration;
                baseFlash = Math.pow(1.0 - progress, 3.0) * 5.0; 
              }

              const baseColor = new THREE.Color(base.dockedTotem.colorHex);
              if (basePulse > 0.01 || baseFlash > 0.01) {
                // ESCALA INCREMENTADA UN 150% MÁS (TOTAL 2.5X DE LA ANTERIOR)
                base.targetColor.copy(baseColor).multiplyScalar(6.0 + baseFlash * 10.0 + basePulse * 16.0);
              } else {
                base.targetColor.copy(baseColor).multiplyScalar(3.6);
              }

            } else {
              const standbyPulse = Math.sin(now * 0.002) * 0.5 + 0.5;
              const minColor = new THREE.Color(0x516c99);
              const maxColor = new THREE.Color(0x99b8ff);
              // ESCALA INCREMENTADA UN 150% MÁS (TOTAL 2.5X DE LA ANTERIOR)
              base.targetColor.copy(minColor).lerp(maxColor, standbyPulse).multiplyScalar(4.0);
            }

            base.ringMaterial.color.lerp(base.targetColor, 8 * dt);
          });

          // --- MEJORA UX: Animación de los aros de luz de los Altavoces en las esquinas ---
          const ambientPulse = Math.sin(now * 0.0015) * 0.3 + 0.7;
          let beatIntensity = 0;
          if (this.sequencer.analyser && this.sequencer.isPlaying) {
            this.sequencer.analyser.getByteFrequencyData(this.sequencer.dataArray);
            beatIntensity = (this.sequencer.dataArray[2] || 0) / 255;
          }

          const standbyColor = new THREE.Color(0xbba6dd); // Violáceo suave pastel
          const activeBeatColor = new THREE.Color(0xf6ebff); // Blanco con un tinte violáceo brillante (violáceo blanquecino)

          this.speakerGlows.forEach((glowMat) => {
            const lerpedColor = standbyColor.clone().lerp(activeBeatColor, beatIntensity);
            // ESCALA INCREMENTADA UN 150% MÁS (TOTAL 2.5X DE LA ANTERIOR)
            glowMat.color.copy(lerpedColor).multiplyScalar(6.0 + ambientPulse * 4.0 + beatIntensity * 32.0);
          });
        }
      }

      // --- INICIALIZACIÓN ---
      document.addEventListener('DOMContentLoaded', function () {
        const options = new xb.Options();
        options.enableUI();
        
        // Habilitar los controladores nativos de Meta Quest 3 y gestos de WebXR
        options.enableControllers();
        options.enableGestures();
        
        xb.add(new TotemExperience());
        xb.init(options);
      });
    </script>
